<div class="container-fluid p-4">
  <!-- Header -->
  <div class="row mb-4">
    <div class="col">
      <div class="d-flex justify-content-between align-items-center">
        <div>
          <h1 class="h3 mb-2">Add New Expense</h1>
          <nav aria-label="breadcrumb">
            <ol class="breadcrumb mb-0">
              <li class="breadcrumb-item">
                <a routerLink="/expenses" class="text-decoration-none">Dashboard</a>
              </li>
              <li class="breadcrumb-item">
                <a routerLink="/expenses" class="text-decoration-none">Expenses</a>
              </li>
              <li class="breadcrumb-item active" aria-current="page">
                Add Expense
              </li>
            </ol>
          </nav>
        </div>
        <div>
          <button class="btn btn-outline-secondary me-2" (click)="onCancel()">
            <i class="bi bi-arrow-left me-2"></i>
            Back
          </button>
          <button class="btn btn-outline-primary">
            <i class="bi bi-person-circle me-2"></i>
          </button>
        </div>
      </div>
    </div>
  </div>

  <!-- Form Content -->
  <div class="row">
    <!-- Form Section -->
    <div class="col-lg-7">
      <div class="card shadow-sm">
        <div class="card-body p-4">
          <form (ngSubmit)="onSubmit()">
            <!-- Title -->
            <div class="mb-4">
              <label for="title" class="form-label fw-semibold">Title</label>
              <input type="text" id="title" class="form-control form-control-lg border-0 bg-light"
                placeholder="Enter expense title" [(ngModel)]="expenseForm.title" name="title" required>
            </div>

            <!-- Amount -->
            <div class="mb-4">
              <label for="amount" class="form-label fw-semibold">Amount</label>
              <div class="input-group input-group-lg">
                <span class="input-group-text bg-light border-0">₹</span>
                <input type="number" id="amount" class="form-control border-0 bg-light" placeholder="Enter amount"
                  [(ngModel)]="expenseForm.amount" name="amount" min="0" step="0.01" required>
              </div>
            </div>

            <!-- Category -->
            <div class="mb-4">
              <label for="category" class="form-label fw-semibold">Category</label>
              <select id="category" class="form-select form-select-lg border-0 bg-light"
                [(ngModel)]="expenseForm.category" name="category" required>
                <option value>Select category</option>
                <option *ngFor="let cat of categories" [value]="cat.value">
                  {{ cat.label }}
                </option>
              </select>
            </div>

            <!-- Date -->
            <div class="mb-4">
              <label for="date" class="form-label fw-semibold">Date</label>
              <input type="date" id="date" class="form-control form-control-lg border-0 bg-light"
                [(ngModel)]="expenseForm.date" name="date" required>
            </div>

            <!-- Payment Method -->
            <div class="mb-4">
              <label for="paymentMethod" class="form-label fw-semibold">Payment
                Method</label>
              <select id="paymentMethod" class="form-select form-select-lg border-0 bg-light"
                [(ngModel)]="expenseForm.paymentMethod" name="paymentMethod" required>
                <option value>Select payment method</option>
                <option *ngFor="let method of paymentMethods" [value]="method.value">
                  {{ method.label }}
                </option>
              </select>
            </div>

            <!-- Account -->
            <div class="mb-4">
              <label for="account" class="form-label fw-semibold">Account</label>
              <select id="account" class="form-select form-select-lg border-0 bg-light"
                [(ngModel)]="expenseForm.account" name="account" required>
                <option value>Select account</option>
                <option *ngFor="let acc of accounts" [value]="acc.value">
                  {{ acc.label }}
                </option>
              </select>
            </div>

            <!-- Notes -->
            <div class="mb-4">
              <label for="notes" class="form-label fw-semibold">Notes
                (Optional)</label>
              <textarea id="notes" class="form-control border-0 bg-light" rows="3" placeholder="Add a note here..."
                [(ngModel)]="expenseForm.notes" name="notes"></textarea>
            </div>

            <!-- Submit Button -->
            <div class="d-grid">
              <button type="submit" class="btn btn-primary btn-lg" [disabled]="!isFormValid()">
                <i class="bi bi-plus-circle me-2"></i>
                Add Expense
              </button>
            </div>
          </form>
        </div>
      </div>
    </div>

    <!-- Illustration Section -->
    <div class="col-lg-5">
      <div class="d-flex align-items-center justify-content-center" style="min-height: 600px;">
        <div class="text-center">
          <img
            src="../../../../assets/images/add-expense.png"
            alt="Expense illustration" 
            class="img-fluid mb-4" 
            style="max-width: 300px;">
          <p class="text-muted">
            Track your expenses efficiently and manage your finances better.
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
